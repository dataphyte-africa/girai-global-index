# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0

env:
  # Public — available at build and runtime
  - variable: NEXT_PUBLIC_SANITY_PROJECT_ID
    value: wwnfg3le
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_SANITY_DATASET
    value: production
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_SANITY_API_VERSION
    value: "2024-10-01"
    availability:
      - BUILD
      - RUNTIME

  - variable: OPENAI_VECTOR_STORE_ID
    value: vs_6a3a6e41c3548191b72539d24aa60b0b
    availability:
      - BUILD
      - RUNTIME

  - variable: GOOGLE_SHEETS_SHEET_NAME
    value: Submissions
    availability:
      - RUNTIME

  - variable: DOWNLOAD_FIRST_REPORT_PATH
    value: https://storage.googleapis.com/girai-global-index-downloads/GIRAI-2024-report.pdf
    availability:
      - RUNTIME

  - variable: DOWNLOAD_SECOND_REPORT_PATH
    value: https://storage.googleapis.com/girai-global-index-downloads/GIRAI-2026-report.pdf
    availability:
      - RUNTIME

  - variable: DOWNLOAD_FIRST_DATA_PATH
    value: https://storage.googleapis.com/girai-global-index-downloads/GIRAI_2024_dataset.xlsx
    availability:
      - RUNTIME

  - variable: DOWNLOAD_SECOND_DATA_PATH
    value: https://storage.googleapis.com/girai-global-index-downloads/GIRAI_2026_dataset.xlsx
    availability:
      - RUNTIME

  # Server-only secrets (Cloud Secret Manager)
  - variable: OPENAI_API_KEY
    secret: OPENAI_API_KEY
    availability:
      - RUNTIME

  - variable: SANITY_API_READ_TOKEN
    secret: SANITY_API_READ_TOKEN
    availability:
      - BUILD
      - RUNTIME

  - variable: SANITY_REVALIDATE_SECRET
    secret: SANITY_REVALIDATE_SECRET
    availability:
      - RUNTIME

  # Uncomment after setting the secret:
  # firebase apphosting:secrets:set GOOGLE_SHEETS_WEB_APP_URL --data-file - --force
  # - variable: GOOGLE_SHEETS_WEB_APP_URL
  #   secret: GOOGLE_SHEETS_WEB_APP_URL
  #   availability:
  #     - RUNTIME
